      const sellPct = 100 - buyPct - holdPct;
      return (
        <div className="bg-slate-800/60 border border-slate-700/50 rounded-xl p-5 space-y-4">
          <div className="flex rounded-full overflow-hidden h-3">
            <div className="bg-emerald-500 transition-all" style={{width: `${buyPct}%`}} />

            <span><span className="text-red-400 font-bold">{consensus.sell}</span> Sell ({sellPct}%)</span>
          </div>
          <div className="grid grid-cols-3 gap-3 pt-2 border-t border-slate-700/50">
            {[
              { label: "Huidig", value: currentPrice },
              { label: "Koersdoel", value: consensus.priceTarget },
              { label: "Upside", value: consensus.upside },
            ].map(m => (
              <div key={m.label} className="text-center">
                <div className="text-slate-400 text-xs">{m.label}</div>
                <div className={`font-semibold text-sm mt-0.5 ${
                  m.label === "Upside"
                    ? (m.value.startsWith('+') ? 'text-emerald-400' : 'text-red-400')
                    : 'text-white'
                }`}>{m.value}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function TrendReport({ text }) {
      const paragraphs = text.split('\n\n');
      return (
        <div className="bg-slate-800/40 border border-slate-700/40 rounded-xl p-5 space-y-3">
          {paragraphs.map((p, i) => (
            <p key={i} className="text-slate-300 text-sm leading-relaxed">{p}</p>
          ))}
        </div>
      );
    }

    function RiskOpportunityCards({ risk, opportunities }) {
      return (
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div className="bg-red-950/40 border border-red-800/30 rounded-xl p-4">
            <div className="text-red-400 text-xs font-bold uppercase tracking-wide mb-2">Risico</div>
            <p className="text-red-300 text-sm leading-relaxed">{risk}</p>
          </div>
          <div className="bg-emerald-950/30 border border-emerald-800/30 rounded-xl p-4">
            <div className="text-emerald-400 text-xs font-bold uppercase tracking-wide mb-2">Kansen</div>
            <ul className="space-y-1.5">
              {opportunities.map((o, i) => (
                <li key={i} className="flex gap-2 text-sm text-emerald-300">
                  <span className="text-emerald-500 shrink-0">›</span>
                  <span>{o}</span>
                </li>
              ))}
            </ul>
          </div>
        </div>
      );
    }

    function CompanyHeader({ stock }) {
      return (
        <div className="bg-slate-800/60 border border-slate-700/50 rounded-xl p-5">
          <div className="flex items-start justify-between gap-4 mb-4">
            <div className="flex items-center gap-3">
              <div className={`w-12 h-12 rounded-xl flex items-center justify-center font-bold text-xs ${stock.type === 'KOPEN' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>
                {stock.ticker}
              </div>
              <div>
                <h2 className="text-white text-xl font-bold">{stock.name}</h2>
                <div className="flex items-center gap-2 mt-0.5">
                  <span className="text-slate-400 text-sm">{stock.ticker}</span>
                  <Badge type={stock.type} />
                </div>
              </div>
            </div>
            <div className="text-right shrink-0">
              <div className="text-white text-2xl font-bold">{stock.price}</div>
              <div className={`text-sm font-medium ${stock.ytd.startsWith('+') ? 'text-emerald-400' : 'text-red-400'}`}>YTD {stock.ytd}</div>
            </div>
          </div>
          <div className="grid grid-cols-3 gap-2">
            {[{ label: "Market Cap", value: stock.mcap }, { label: "P/E Ratio", value: stock.pe }, { label: "YTD Return", value: stock.ytd }].map(m => (
              <div key={m.label} className="bg-slate-900/60 rounded-lg p-3 text-center">
                <div className="text-slate-400 text-xs">{m.label}</div>
                <div className={`text-sm font-semibold mt-0.5 ${m.label === "YTD Return" ? (m.value.startsWith('+') ? 'text-emerald-400' : 'text-red-400') : 'text-white'}`}>{m.value}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function CompanyDetailView({ ticker }) {
      const stock = getStockByTicker(ticker);
      if (!stock) return null;
      return (
        <div className="space-y-6 fade-in">
          <CompanyHeader stock={stock} />
          <div>
            <SectionHeader title="Nieuws Afgelopen 3 Maanden" subtitle="Chronologisch, meest recent eerst" />
            <NewsTimeline items={stock.newsTimeline} />
          </div>
          <Divider />
          <div>
            <SectionHeader title="Financiële Kerncijfers" subtitle="Meest recente kwartaal / TTM" />
            <FinancialBreakdown financials={stock.financials} />
          </div>
          <Divider />
          <div>
            <SectionHeader title="Analistenconsensus" subtitle="Buy / Hold / Sell verdeling + koersdoel" />
            <AnalystConsensus consensus={stock.analystConsensus} currentPrice={stock.price} />
          </div>
          <Divider />
          <div>
            <SectionHeader title="Trend Rapport" subtitle="Bedrijfsstrategie & marktdynamiek" />
            <TrendReport text={stock.trendReport} />
          </div>
          <Divider />
          <RiskOpportunityCards risk={stock.risk} opportunities={stock.opportunities} />
        </div>
      );
    }

    function CompetitiveLandscapeTable({ rows }) {
      return (
        <div className="overflow-x-auto rounded-xl border border-slate-700/50">
          <table className="w-full text-sm">
            <thead>
              <tr className="bg-slate-800/80 text-slate-400 text-xs uppercase tracking-wide">
                <th className="px-4 py-3 text-left">Bedrijf</th>
                <th className="px-4 py-3 text-left">Positie</th>
                <th className="px-4 py-3 text-left hidden md:table-cell">Moat</th>
                <th className="px-4 py-3 text-left hidden md:table-cell">Bedreiging</th>
                <th className="px-4 py-3 text-left">Outlook</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-slate-700/30">
              {rows.map((row, i) => (
                <tr key={i} className="bg-slate-900/40 hover:bg-slate-800/40 transition-colors">
                  <td className="px-4 py-3">
                    <span className="font-medium text-white">{row.company}</span>
                    <span className="text-slate-500 text-xs ml-1">{row.ticker}</span>
                  </td>
                  <td className="px-4 py-3 text-slate-300 text-xs">{row.position}</td>
                  <td className="px-4 py-3 text-slate-400 text-xs hidden md:table-cell">{row.moat}</td>
                  <td className="px-4 py-3 text-slate-400 text-xs hidden md:table-cell">{row.threat}</td>
                  <td className="px-4 py-3">
                    <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${
                      row.outlook === 'Positief' ? 'bg-emerald-500/20 text-emerald-400' :
                      row.outlook === 'Negatief' ? 'bg-red-500/20 text-red-400' :
                      'bg-amber-500/20 text-amber-400'
                    }`}>{row.outlook}</span>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function IndustryDetailView({ tab }) {
      const dataMap = { tech: techData, pharma: pharmaData, consumer: consumerData };
      const data = dataMap[tab];
      const detail = data.industryDetail;
      const tabLabels = { tech: "Tech & AI Infrastructure", pharma: "Pharma & Healthcare", consumer: "Consumer & Branding" };
      return (
        <div className="space-y-6 fade-in">
          <div className="bg-slate-800/40 border border-slate-700/40 rounded-xl p-4 flex items-center gap-3">
            <div className="w-2 h-2 bg-indigo-400 rounded-full" />
            <span className="text-indigo-400 text-xs font-bold uppercase tracking-wide">Sectorrapport – {tabLabels[tab]} – {DATA_DATE}</span>
          </div>
          <div>
            <SectionHeader title="Competitief Landschap" subtitle="Head-to-head marktpositie vergelijking" />
            <CompetitiveLandscapeTable rows={detail.competitiveLandscape} />
          </div>
          <Divider />
          <div>
            <SectionHeader title="Sectornieuws – Afgelopen 3 Maanden" subtitle="Chronologisch, meest recent eerst" />
            <NewsTimeline items={detail.sectorNews} />
          </div>
          <Divider />
          <div>
            <SectionHeader title="Macro Context" subtitle="Renteontwikkeling & economische achtergrond" />
            <TrendReport text={detail.macroContext} />
          </div>
          <Divider />
          <div>
            <SectionHeader title="Uitgebreide Prognoses" subtitle="Langetermijn marktdynamieken" />
            <ForecastCards items={detail.longerForecasts} />
          </div>
        </div>
      );
    }

    // ─── TAB CONTENT ─────────────────────────────────────────────────────────

    function SectorReportButton({ onClick }) {
      return (
        <button
          onClick={onClick}
          className="flex items-center gap-2 text-indigo-400 hover:text-indigo-300 text-sm font-medium border border-indigo-500/30 hover:border-indigo-500/60 rounded-lg px-4 py-2 transition-all"
        >
          Volledig sectorrapport
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </button>
      );
    }

    function TechTab({ onDrillDown, onSectorReport }) {
      return (
        <div className="space-y-6 fade-in">
          <NewsCard news={techData.newsHighlight} />
          <div>
            <SectionHeader title="Timeline & Trends" subtitle="Van LLM-hype naar infrastructuur winstgevendheid" />
            <div className="mt-2">
              {techData.timeline.map((item, i) => (
                <TimelineNode key={i} item={item} index={i} total={techData.timeline.length} />
              ))}
            </div>
          </div>
          <Divider />
          <div>
            <SectionHeader title="Prognoses 2026" subtitle="Marktdynamieken die de komende 12 maanden domineren" />
            <ForecastCards items={techData.forecasts} />
          </div>
          <Divider />
          <div>
            <div className="flex items-center justify-between mb-4">
              <div>
                <h2 className="text-white font-semibold text-base">Concrete Aandelen</h2>
                <p className="text-slate-400 text-sm mt-0.5">Kopen & Volgen – klik voor thesis, dan "volledig rapport" voor diepteanalyse</p>
              </div>
              <SectorReportButton onClick={onSectorReport} />
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              {techData.stocks.map((s, i) => <StockCard key={i} stock={s} onDrillDown={onDrillDown} />)}
            </div>
          </div>
        </div>
      );
    }

    function PharmaTab({ onDrillDown, onSectorReport }) {
      return (
        <div className="space-y-6 fade-in">
          <NewsCard news={pharmaData.newsHighlight} />
          <div>
            <SectionHeader title="Timeline & Trends" subtitle="Van handmatige screening naar AI-gedreven drug discovery" />
            <div className="mt-2">
              {pharmaData.timeline.map((item, i) => (
                <TimelineNode key={i} item={item} index={i} total={pharmaData.timeline.length} />
              ))}
            </div>
          </div>
          <Divider />
          <div>
            <SectionHeader title="Prognoses 2026" subtitle="Healthcare AI & GLP-1 marktdynamieken" />
            <ForecastCards items={pharmaData.forecasts} />
          </div>
          <Divider />
          <div>
            <div className="flex items-center justify-between mb-4">
              <div>
                <h2 className="text-white font-semibold text-base">Concrete Aandelen</h2>
                <p className="text-slate-400 text-sm mt-0.5">Kopen & Volgen – klik voor thesis, dan "volledig rapport" voor diepteanalyse</p>
              </div>
              <SectorReportButton onClick={onSectorReport} />
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              {pharmaData.stocks.map((s, i) => <StockCard key={i} stock={s} onDrillDown={onDrillDown} />)}
            </div>
          </div>
        </div>
      );
    }

    function ConsumerTab({ onDrillDown, onSectorReport }) {
      return (
        <div className="space-y-6 fade-in">
          <NewsCard news={consumerData.newsHighlight} />
          <div>
            <SectionHeader title="Timeline & Trends" subtitle="Van traditionele retail naar hyper-gepersonaliseerde social commerce" />
            <div className="mt-2">
              {consumerData.timeline.map((item, i) => (
                <TimelineNode key={i} item={item} index={i} total={consumerData.timeline.length} />
              ))}
            </div>
          </div>
          <Divider />
          <div>
            <SectionHeader title="Prognoses 2026" subtitle="Social commerce vs. brand trust premium" />
            <ForecastCards items={consumerData.forecasts} />
          </div>
          <Divider />
          <div className="bg-red-950/50 border border-red-700/40 rounded-xl p-5">
            <div className="flex items-center gap-2 mb-3">
              <div className="w-5 h-5 rounded bg-red-500/30 flex items-center justify-center">
                <span className="text-red-400 text-xs font-bold">!</span>
              </div>
              <span className="text-red-400 font-bold text-sm uppercase tracking-wide">Brand Equity Alert</span>
            </div>
            <h3 className="text-white font-semibold mb-3">{consumerData.brandingDanger.title}</h3>
            <div className="space-y-3">
              {consumerData.brandingDanger.points.map((p, i) => (
                <div key={i} className="flex gap-3">
                  <div className="w-1.5 h-1.5 rounded-full bg-red-500 mt-2 shrink-0" />
                  <div>
                    <span className="text-red-300 font-medium text-sm">{p.label}: </span>
                    <span className="text-slate-300 text-sm">{p.desc}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div>
            <div className="flex items-center justify-between mb-4">
              <div>
                <h2 className="text-white font-semibold text-base">Concrete Aandelen</h2>
                <p className="text-slate-400 text-sm mt-0.5">Volgen – klik voor thesis, dan "volledig rapport" voor diepteanalyse</p>
              </div>
              <SectorReportButton onClick={onSectorReport} />
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              {consumerData.stocks.map((s, i) => <StockCard key={i} stock={s} onDrillDown={onDrillDown} />)}
            </div>
          </div>
        </div>
      );
    }

    // ─── MAIN APP ─────────────────────────────────────────────────────────────

    const TABS = [
      { id: "tech",     label: "Tech & AI Infrastructure", short: "Tech & AI" },
      { id: "pharma",   label: "Pharma & Healthcare",      short: "Pharma" },
      { id: "consumer", label: "Consumer & Branding",      short: "Consumer" },
    ];

    function App() {
      const [active, setActive] = useState("tech");
      const [currentView, setCurrentView] = useState({ type: 'sector' });

      function navigateToCompany(ticker) {
        setCurrentView({ type: 'company', ticker, fromTab: active });
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
      function navigateToIndustry(tab) {
        setCurrentView({ type: 'industry', tab });
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
      function navigateBack() {
        const returnTab = currentView.fromTab || currentView.tab || active;
        setActive(returnTab);
        setCurrentView({ type: 'sector' });
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      const inDetail = currentView.type !== 'sector';

      return (
        <div className="min-h-screen bg-slate-950 text-white font-sans">
          <div className="border-b border-slate-800 bg-slate-900/80 backdrop-blur-sm sticky top-0 z-20">
            <div className="max-w-5xl mx-auto px-4 py-4">
              <div className="flex items-center justify-between mb-4">
                <div>
                  {inDetail ? (
                    <BackButton onClick={navigateBack} />
                  ) : (
                    <h1 className="text-xl font-bold text-white tracking-tight">
                      Markt<span className="text-indigo-400">Dashboard</span>
                    </h1>
                  )}
                  <p className="text-slate-400 text-xs mt-0.5">Sectoranalyse · {DATA_DATE} · Equity Research</p>
                </div>
                <div className="bg-emerald-500/10 border border-emerald-500/20 rounded-lg px-3 py-1.5 text-right">
                  <div className="text-emerald-400 text-xs font-semibold">LIVE ANALYSE</div>
                  <div className="text-slate-400 text-xs">{DATA_DATE}</div>
                </div>
              </div>
              <div className={`flex gap-1 transition-opacity duration-200 ${inDetail ? 'opacity-30 pointer-events-none' : ''}`}>
                {TABS.map(tab => (
                  <button
                    key={tab.id}
                    onClick={() => { if (!inDetail) setActive(tab.id); }}
                    className={`px-3 py-2 rounded-lg text-sm font-medium transition-all duration-150 ${
                      active === tab.id
                        ? "bg-indigo-600 text-white shadow-lg shadow-indigo-500/20"
                        : "text-slate-400 hover:text-white hover:bg-slate-800"
                    }`}
                  >
                    <span className="hidden sm:inline">{tab.label}</span>
                    <span className="sm:hidden">{tab.short}</span>
                  </button>
                ))}
              </div>
            </div>
          </div>

          <div className="max-w-5xl mx-auto px-4 py-8">
            {currentView.type === 'sector' && active === 'tech'     && <TechTab     onDrillDown={navigateToCompany} onSectorReport={() => navigateToIndustry('tech')} />}
            {currentView.type === 'sector' && active === 'pharma'   && <PharmaTab   onDrillDown={navigateToCompany} onSectorReport={() => navigateToIndustry('pharma')} />}
            {currentView.type === 'sector' && active === 'consumer' && <ConsumerTab onDrillDown={navigateToCompany} onSectorReport={() => navigateToIndustry('consumer')} />}
            {currentView.type === 'company'  && <CompanyDetailView  ticker={currentView.ticker} />}
            {currentView.type === 'industry' && <IndustryDetailView tab={currentView.tab} />}
          </div>

          <div className="border-t border-slate-800 mt-12">
            <div className="max-w-5xl mx-auto px-4 py-6 flex flex-col sm:flex-row items-center justify-between gap-2">
              <p className="text-slate-500 text-xs">Beleggingstracker · Gegenereerd {DATA_DATE} · Geen financieel advies</p>
              <div className="flex gap-3">
                <span className="text-xs bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded-full">KOPEN = actief instappen</span>
                <span className="text-xs bg-amber-500/10 border border-amber-500/20 text-amber-400 px-2 py-0.5 rounded-full">VOLGEN = monitoren</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
